<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Sales Dashboard</title>
    <meta name="description" content="A premium sales dashboard showing revenue, regional performance, and acquisition channels.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">N</div>
                <h1>Nexus</h1>
            </div>
            <nav>
                <ul>
                    <li class="active"><a href="#">Dashboard</a></li>
                    <li><a href="#">Analytics</a></li>
                    <li><a href="#">Reports</a></li>
                    <li><a href="#">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                </div>
                <div class="user-profile">
                    <div class="avatar"></div>
                    <span>Admin User</span>
                </div>
            </header>

            <div class="metrics-grid">
                <div class="metric-card" id="metric-revenue">
                    <h3>Total Revenue</h3>
                    <p class="value">$124,500</p>
                    <span class="trend positive">+12.5%</span>
                </div>
                <div class="metric-card" id="metric-users">
                    <h3>Active Users</h3>
                    <p class="value">45,210</p>
                    <span class="trend positive">+8.2%</span>
                </div>
                <div class="metric-card" id="metric-sales">
                    <h3>Sales</h3>
                    <p class="value">1,245</p>
                    <span class="trend negative">-2.4%</span>
                </div>
                <div class="metric-card" id="metric-conversion">
                    <h3>Conversion</h3>
                    <p class="value">3.8%</p>
                    <span class="trend positive">+1.1%</span>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card span-2">
                    <div class="chart-header">
                        <h2>Revenue Over Time</h2>
                    </div>
                    <div class="chart-body">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h2>Sales by Category</h2>
                    </div>
                    <div class="chart-body">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>

                <div class="chart-card span-2">
                    <div class="chart-header">
                        <h2>Monthly Sales Comparison</h2>
                    </div>
                    <div class="chart-body">
                        <canvas id="comparisonChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h2>Regional Performance</h2>
                    </div>
                    <div class="chart-body">
                        <canvas id="regionChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h2>Acquisition Channels</h2>
                    </div>
                    <div class="chart-body">
                        <canvas id="channelChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
